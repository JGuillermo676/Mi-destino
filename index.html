<style>
body {
  margin: 0;
  padding: 0;
  font-family: "Segoe UI", sans-serif;
  background: radial-gradient(circle at top, #111 0%, #000 70%);
  color: white;
  min-height: 100vh;
  overflow-y: auto;
  position: relative;

  /* Centrar contenido vertical y horizontal */
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

/* Botón inicial */
#openBtn {
  padding: 18px 36px;
  font-size: 1.3rem;
  font-weight: bold;
  color: white;
  background: linear-gradient(135deg, #8a5cff, #cfa7ff);
  border: none;
  border-radius: 25px;
  cursor: pointer;
  box-shadow: 0 0 20px rgba(255,255,255,0.3);
  transition: transform 0.3s, box-shadow 0.3s;
  z-index: 10;
  /* Centrado automático en flexbox */
  align-self: center;
}

#openBtn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px #cfa7ff;
}

/* Tarjeta del mensaje */
.card {
  display: none;
  background: rgba(20, 20, 30, 0.85);
  border-radius: 20px;
  box-shadow: 0 0 25px rgba(255,255,255,0.15);
  padding: 15px 20px;
  width: 85%;
  max-width: 400px;
  text-align: center;
  margin: 20px auto; /* margen superior e inferior */
  position: relative;
  z-index: 1;
  backdrop-filter: blur(6px);
  transform: scale(0.77);
}

h1 {
  color: #cfa7ff;
  font-size: 1.7rem;
  margin-bottom: 6px;
}

.poem {
  margin: 12px 0;
  font-size: 0.9rem;
  font-style: italic;
  line-height: 1.5;
  color: #ddd;
  white-space: pre-line;
}

button.messageBtn {
  margin-top: 12px;
  padding: 9px 18px;
  font-size: 0.9rem;
  background: linear-gradient(135deg, #8a5cff, #cfa7ff);
  color: white;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  transition: transform 0.3s, box-shadow 0.3s;
}

button.messageBtn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 12px #cfa7ff;
}

#personalPhoto {
  margin-top: 12px;
  max-width: 100%;
  border-radius: 12px;
  display: none;
  box-shadow: 0 0 20px rgba(255,255,255,0.3);
}

#specialMessage {
  margin-top: 8px;
  font-size: 0.9rem;
  color: #cfa7ff;
  display: none;
}

/* Cometas blancas */
.meteor {
  position: absolute;
  font-size: 14px;
  color: white;
  opacity: 0.8;
  text-shadow: 0 0 6px white;
  animation-name: shoot;
  animation-timing-function: linear;
  animation-iteration-count: infinite;
}

@keyframes shoot {
  0% { transform: translate(0,0) rotate(0deg); opacity:1; }
  100% { transform: translate(80vw, 100vh) rotate(360deg); opacity:0; }
}

/* Ajustes para móvil */
@media (max-width: 500px) {
  body {
    padding: 20px;
  }
  .card { 
    transform: scale(0.85); 
    width: 95%; 
    padding: 18px; 
  }
  #openBtn { 
    font-size: 1.2rem; 
    padding: 16px 28px; 
  }
  .meteor { font-size: 12px; }
}
</style>
