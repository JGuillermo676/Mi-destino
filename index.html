<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Danna ✨</title>

<style>
  body {
    margin: 0;
    padding: 0;
    font-family: "Segoe UI", sans-serif;
    background: radial-gradient(circle at top, #111 0%, #000 70%);
    color: white;
    min-height: 100vh;
    overflow-y: auto;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* Botón de inicio */
  #openBtn {
    padding: 20px 40px;
    font-size: 1.5rem;
    font-weight: bold;
    color: white;
    background: linear-gradient(135deg, #8a5cff, #cfa7ff);
    border: none;
    border-radius: 25px;
    cursor: pointer;
    box-shadow: 0 0 20px rgba(255,255,255,0.3);
    transition: transform 0.3s, box-shadow 0.3s;
  }

  #openBtn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px #cfa7ff;
  }

  /* Tarjeta del mensaje */
  .card {
    display: none;
    background: rgba(20, 20, 30, 0.85);
    border-radius: 20px;
    box-shadow: 0 0 25px rgba(255,255,255,0.15);
    padding: 15px 20px;
    width: 85%;
    max-width: 350px;
    text-align: center;
    margin: 40px auto;
    position: relative;
    z-index: 1;
    backdrop-filter: blur(6px);
    transform: scale(0.77); /* 10% más grande */
  }

  h1 {
    color: #cfa7ff;
    font-size: 1.7rem;
    margin-bottom: 6px;
  }

  .poem {
    margin: 12px 0;
    font-size: 0.9rem;
    font-style: italic;
    line-height: 1.5;
    color: #ddd;
    white-space: pre-line;
  }

  button.messageBtn {
    margin-top: 12px;
    padding: 9px 18px;
    font-size: 0.9rem;
    background: linear-gradient(135deg, #8a5cff, #cfa7ff);
    color: white;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    transition: transform 0.3s, box-shadow 0.3s;
  }

  button.messageBtn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 12px #cfa7ff;
  }

  #personalPhoto {
    margin-top: 12px;
    max-width: 100%;
    border-radius: 12px;
    display: none;
    box-shadow: 0 0 20px rgba(255,255,255,0.3);
  }

  #specialMessage {
    margin-top: 8px;
    font-size: 0.9rem;
    color: #cfa7ff;
    display: none;
  }

  /* Estrellas fugaces */
  .meteor {
    position: absolute;
    top: 0;
    width: 2px;
    height: 80px;
    background: linear-gradient(45deg, white, rgba(255,255,255,0));
    opacity: 0.8;
    transform: rotate(45deg);
    animation: shoot linear forwards;
  }

  @keyframes shoot {
    0% {
      transform: translate(0, 0) rotate(45deg);
      opacity: 1;
    }
    100% {
      transform: translate(100vw, 100vh) rotate(45deg);
      opacity: 0;
    }
  }
</style>
</head>

<body>

<!-- Botón inicial -->
<button id="openBtn">Ábreme</button>

<!-- Música de fondo -->
<audio id="backgroundMusic" loop>
  <source src="musica.mp3" type="audio/mpeg">
  Tu navegador no soporta audio.
</audio>

<!-- Tarjeta con mensaje -->
<div class="card" id="messageCard">
  <h1>Para Danna ✨</h1>
  <div class="poem">
<!-- Mensaje largo aquí (lo puedes mantener igual que antes) -->
Mientras hablábamos ese día, el cielo estaba sobre nosotros...
  </div>

  <button class="messageBtn" id="showPhotoBtn">Haz clic aquí</button>
  <img id="personalPhoto" src="estrella.jpg" alt="Foto personal">
  <div id="specialMessage">✨Entre todas las estrellas, tú eres la que más brilla ✨</div>
</div>

<script>
  const openBtn = document.getElementById("openBtn");
  const music = document.getElementById("backgroundMusic");
  const messageCard = document.getElementById("messageCard");

  openBtn.addEventListener("click", () => {
    music.play();
    messageCard.style.display = "block";
    openBtn.style.display = "none";
  });

  const showPhotoBtn = document.getElementById("showPhotoBtn");
  const photo = document.getElementById("personalPhoto");
  const specialMsg = document.getElementById("specialMessage");

  showPhotoBtn.addEventListener("click", () => {
    photo.style.display = "block";
    specialMsg.style.display = "block";
    showPhotoBtn.style.display = "none";
  });

  // Crear estrellas fugaces aleatorias
  const totalMeteors = 10; // cantidad de estrellas fugaces
  for (let i = 0; i < totalMeteors; i++) {
    const meteor = document.createElement('div');
    meteor.classList.add('meteor');
    meteor.style.left = Math.random() * 100 + 'vw';
    meteor.style.top = Math.random() * 20 + 'vh';
    meteor.style.animationDuration = (1 + Math.random() * 1.5) + 's';
    meteor.style.animationDelay = Math.random() * 5 + 's';
    document.body.appendChild(meteor);
  }
</script>

</body>
</html>
